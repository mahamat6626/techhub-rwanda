version: '3.8'

services:
  backend:
    build: ./backend
    container_name: techhub-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
    volumes:
      - db-data:/app/techhub.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: techhub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
